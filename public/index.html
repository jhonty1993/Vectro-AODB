<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vectro — The Airport Operating System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛫</text></svg>">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div>
        <div class="brand-name">VECTRO</div>
        <div class="brand-sub">Airport Operating System</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <div id="airport-chip"></div>
      <a href="/portal.html" class="portal-link">Landing Fees Portal →</a>
      <div class="foot-note">TechHouseCa Inc. · v1.2</div>
    </div>
  </aside>
  <div id="main-col">
    <header id="topbar">
      <div id="crumb"></div>
      <div class="top-right">
        <div id="wx-chip" class="chip" title="Latest METAR"></div>
        <div id="clock" class="chip"></div>
        <button id="bell" class="bell" title="Alert Center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span id="bell-count" class="bell-count" hidden></span>
        </button>
        <div id="live-dot" class="live"><span class="dot"></span>LIVE</div>
      </div>
    </header>
    <main id="view"></main>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
